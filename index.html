<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Mapa - Clientes proximos</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow-x:hidden}
body{font-family:-apple-system,'Segoe UI',Inter,Roboto,sans-serif;color:#0f1b33;background:#eef1f6;display:flex;flex-direction:column;height:100vh;overflow:hidden}

.top{background:linear-gradient(135deg,#0b5cab,#1e7fd4);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.top h1{font-size:15px;font-weight:700;line-height:1.15;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.loc{font-size:13px;background:rgba(255,255,255,.20);border:1px solid rgba(255,255,255,.45);padding:0 14px;height:40px;display:flex;align-items:center;border-radius:11px;cursor:pointer;white-space:nowrap;font-weight:600;flex-shrink:0}

.main{display:flex;flex:1;min-height:0;position:relative}
#map{flex:1;min-height:0;height:100%}
.fab{position:absolute;top:12px;right:12px;z-index:1200;background:#0b5cab;color:#fff;border:none;height:40px;padding:0 16px;border-radius:20px;font-size:13px;font-weight:700;box-shadow:0 3px 10px rgba(0,0,0,.30);cursor:pointer;font-family:inherit}

.side{width:380px;height:100%;background:#fff;border-left:1px solid #e3e8f0;display:flex;flex-direction:column;min-height:0;max-width:100%}
.sidehead{font-size:13px;font-weight:700;color:#0f1b33;padding:13px 16px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid #eef1f6;flex-shrink:0}
.sidehead .lbl{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidehead .chev{font-size:14px;transition:transform .2s;color:#0b5cab;flex-shrink:0}

.searchbar{padding:10px 12px;border-bottom:1px solid #eef1f6;background:#fff;flex-shrink:0}
.searchwrap{position:relative}
.search{width:100%;height:44px;border:1px solid #d7dfeb;border-radius:11px;background:#f6f8fc;padding:0 38px 0 14px;font-size:15px;color:#0f1b33;outline:none;font-family:inherit}
.search:focus{border-color:#0b5cab;background:#fff;box-shadow:0 0 0 3px rgba(11,92,171,.12)}
.search::placeholder{color:#8a97ad}
.clearx{position:absolute;right:6px;top:6px;width:32px;height:32px;border:none;background:transparent;color:#8a97ad;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.searchwrap.has .clearx{display:flex}

.list{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:0}
body.collapsed .side{display:none}
body.collapsed .sidehead .chev{transform:rotate(180deg)}

.item{padding:14px 16px;border-bottom:1px solid #eef1f6;cursor:pointer;overflow:hidden}
.item:active{background:#eef5ff}
.row1{display:flex;align-items:flex-start;gap:9px;min-width:0}
.num{background:#0b5cab;color:#fff;width:26px;height:26px;border-radius:50%;font-size:12.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.nm{font-weight:600;font-size:15px;flex:1;line-height:1.3;min-width:0;overflow-wrap:anywhere;word-break:break-word}
.dist{font-size:13px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.v0{background:#e7f6ec;color:#1a7f3c}.v1{background:#e7f0fb;color:#0b5cab}.v2{background:#f0f0f4;color:#6a7689}
.addr{font-size:13px;color:#5a6b85;margin:7px 0 0 35px;line-height:1.35;overflow-wrap:anywhere;word-break:break-word}
.telline{display:inline-block;font-size:15px;color:#0b5cab;font-weight:700;margin:6px 0 0 35px;text-decoration:none;overflow-wrap:anywhere;word-break:break-word}
.cart{display:inline-block;margin:8px 0 0 35px;font-size:12.5px;font-weight:700;padding:5px 11px;border-radius:8px;line-height:1.35;overflow-wrap:anywhere}
.cart.venc{background:#fdeaea;color:#c0392b}
.cart.ok{background:#e7f6ec;color:#1a7f3c}
.cart.none{background:#f0f0f4;color:#6a7689}

.btn.wa{display:flex;min-height:46px;align-items:center;justify-content:center;background:#25c466;color:#fff;font-size:15px;font-weight:700;border-radius:11px;text-decoration:none;margin:11px 0 0 0}
.nav{margin:8px 0 2px 0;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{min-width:0;min-height:44px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:14px;font-weight:700;padding:6px 4px;border-radius:11px;text-decoration:none;color:#fff;cursor:pointer;line-height:1.15;overflow-wrap:anywhere}
.btn.waze{background:#1aa9e6}.btn.gm{background:#1a7f3c}

.empty{padding:30px 18px;text-align:center;color:#8a97ad;font-size:14px}

.popbtn{display:inline-block;margin-top:8px;margin-right:8px;font-size:14px;font-weight:700;padding:9px 14px;border-radius:8px;color:#fff;cursor:pointer}
.mtt{background:transparent;border:none;box-shadow:none;color:#fff;font-weight:700;font-size:11px}
.me{background:#0b5cab;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 4px rgba(11,92,171,.3)}
.leaflet-popup-content{font-size:14px;line-height:1.4}

@media (max-width:760px){
  .main{flex-direction:column}
  #map{width:100%;flex:1;min-height:0}
  .side{width:100%;flex-shrink:0;max-height:54vh;border-left:none;border-top:1px solid #e3e8f0}
  body.collapsed .side{max-height:none}
}
</style></head><body>
<div class="top"><h1>Clientes Salus proximos</h1>
<div class="loc" onclick="locate()" id="locbtn">Localizacao</div></div>
<div class="main"><div id="map"></div>
<button class="fab" id="fab" onclick="toggleList()">Ver mapa inteiro</button>
<div class="side">
<div class="sidehead" onclick="toggleList()"><span class="lbl" id="headlbl">20 clientes - toque para abrir/fechar</span><span class="chev">v</span></div>
<div class="searchbar">
<div class="searchwrap" id="searchwrap">
<input class="search" id="search" type="text" inputmode="search" autocomplete="off" placeholder="Buscar cliente por nome" oninput="onSearch()">
<button class="clearx" id="clearx" onclick="clearSearch()" aria-label="Limpar busca">&times;</button>
</div>
</div>
<div class="list" id="list"></div>
</div></div>
<script>
const data=[{"nome": "Leonardo Sanchez - CELTICS MAGIC PROPERTIES LLC", "tel": "+55 11 94195-8022", "end": "16728 Artimino Loop Montverde, FL 34756", "lat": 28.5659862, "lon": -81.6710322, "dist": 0.19, "trocou": "", "validade": "11/07/2026", "vencido": false}, {"nome": "Alexandre Capitani", "tel": "(407) 403-8965", "end": "16344 PENDIO DR, MONTVERDE, FL, 34756", "lat": 28.5711594, "lon": -81.6698058, "dist": 0.2, "trocou": "", "validade": "", "vencido": true}, {"nome": "Graziela Quinamo", "tel": "(781) 853-3960", "end": "16348 PENDIO DR, Bella Collina, MONTVERDE, FL, 34756", "lat": 28.5714457, "lon": -81.6698696, "dist": 0.22, "trocou": "", "validade": "30/04/2027", "vencido": false}, {"nome": "Bruna e Paulo Sereno (Selecta Realty)", "tel": "(407) 883-6648", "end": "17044 Cavallo Drive, Montverde, FL", "lat": 28.5737182, "lon": -81.672825, "dist": 0.36, "trocou": "", "validade": "30/10/2026", "vencido": false}, {"nome": "Chieppe LLC - Giuliana", "tel": "(407) 383-9779", "end": "16913 Crete Way Montverde, FL 34756", "lat": 28.5712759, "lon": -81.6577865, "dist": 0.85, "trocou": "", "validade": "", "vencido": true}, {"nome": "Gilberto e Tais Fialho", "tel": "+55 31 9797-9792", "end": "15223 Pendio Dr, Montverde, FL 34756", "lat": 28.5793945, "lon": -81.6617034, "dist": 0.95, "trocou": "", "validade": "", "vencido": true}, {"nome": "Humberto Engel", "tel": "(407) 421-9067", "end": "16933 Crete Way, Bella Collina, Montverde, FL, 34756", "lat": 28.5712866, "lon": -81.6559436, "dist": 0.96, "trocou": "22/09/2025", "validade": "22/09/2026", "vencido": false}, {"nome": "Adriel Bortolotti - Opera S Investment LLC", "tel": "+55 64 9971-4629", "end": "15930 Pendio Dr, Montverde, FL 34756", "lat": 28.5750297, "lon": -81.655645, "dist": 1.06, "trocou": "", "validade": "", "vencido": true}, {"nome": "Fernanda Rocha Kanner", "tel": "+55 11 99597-9595", "end": "15824 Pendio Dr Montverde, FL 34756", "lat": 28.579302, "lon": -81.6545448, "dist": 1.26, "trocou": "", "validade": "", "vencido": true}, {"nome": "Rui Rocha e Silvia Novack", "tel": "+55 41 9604-6000 / +55 41 9163-7743", "end": "16025 VETTA DR, MONTVERDE, FL, 34756", "lat": 28.5813235, "lon": -81.6891079, "dist": 1.38, "trocou": "", "validade": "", "vencido": true}, {"nome": "Rafael Napoelão e Talita - R&B Business", "tel": "(321) 333-0067", "end": "16816 Bolsena Dr, Montverde, FL 34756", "lat": 28.5883871, "lon": -81.6661308, "dist": 1.4, "trocou": "", "validade": "", "vencido": true}, {"nome": "Guilherme Mendes", "tel": "(412) 969-6426", "end": "16003 Vetta Dr, Montverde, FL 34756", "lat": 28.581726, "lon": -81.6898034, "dist": 1.43, "trocou": "", "validade": "", "vencido": true}, {"nome": "César e Inês Zanchet", "tel": "+55 11 99631-8144", "end": "15425 PENDIO DR, MONTVERDE, FL, 34756", "lat": 28.5880486, "lon": -81.6607811, "dist": 1.49, "trocou": "28/05/2025", "validade": "", "vencido": true}, {"nome": "Daniel Travelstead e Sheila Lago - Adriana nova proprietária", "tel": "(737) 701-0510", "end": "16841 Bolsena Dr, Montverde, FL 34756", "lat": 28.5896453, "lon": -81.6659804, "dist": 1.49, "trocou": "17/01/2026", "validade": "17/01/2027", "vencido": false}, {"nome": "Marcela Ma", "tel": "(407) 457-7042", "end": "17018 Medici Way Montverde, FL 34756", "lat": 28.5864858, "lon": -81.6577947, "dist": 1.49, "trocou": "06/06/2025, 16/06/2026", "validade": "16/06/2027", "vencido": false}, {"nome": "José Carlos da Silva", "tel": "(352) 349-5065", "end": "17038 Medici Way Montverde, FL 34756", "lat": 28.5882777, "lon": -81.6579133, "dist": 1.59, "trocou": "", "validade": "13/01/2027", "vencido": false}, {"nome": "Wagner e Carla Andrade", "tel": "(954) 324-5299", "end": "16021, Volterra Point, Montverde, FL, 34756", "lat": 28.5801816, "lon": -81.6955618, "dist": 1.66, "trocou": "", "validade": "", "vencido": true}, {"nome": "Armando e Bruna Rosseti", "tel": "(407) 690-7015 / (407) 600-5943", "end": "15746 Vetta Dr Montverde, FL 34756", "lat": 28.5828903, "lon": -81.694802, "dist": 1.72, "trocou": "", "validade": "", "vencido": true}, {"nome": "Luana Oliveira", "tel": "(954) 696-7718", "end": "15644 Vetta Dr., Montverde, FL 34756", "lat": 28.5841823, "lon": -81.6962086, "dist": 1.84, "trocou": "", "validade": "02/05/2027", "vencido": false}, {"nome": "Renata Silva e Vinicius - Bellamy VRMM LLC", "tel": "(786) 338-3808", "end": "16101 Bellamy Way Montverde, FL 34756", "lat": 28.5981125, "lon": -81.6887356, "dist": 2.29, "trocou": "23/06/2025", "validade": "", "vencido": true}];const alvo={"lat": 28.5686787, "lon": -81.6715229, "end": "16309 Pendio Dr, Montverde, FL 34756"};

const map=L.map('map').setView([alvo.lat,alvo.lon],14);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'Esri'}).addTo(map);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,opacity:0.9}).addTo(map);
let mePos=null, meMarker=null, line=null; const markers=[];
const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function norm(s){return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function distClass(d){return d<0.5?'v0':(d<1.5?'v1':'v2');}
function waNumber(tel){let d=String(tel).split('/')[0].replace(/\D/g,'');if(!d)return '';if(d.length===10)d='1'+d;return d;}
function waHref(tel){return 'https://wa.me/'+waNumber(tel);}
function cartBadge(c){
  if(c.vencido===true){return '<div class="cart venc">Cartucho VENCIDO'+(c.trocou?' &middot; ultima troca '+esc(c.trocou):'')+'</div>';}
  if(c.vencido===false){return '<div class="cart ok">Cartucho em dia'+(c.validade?' &middot; vence '+esc(c.validade):'')+(c.trocou?' &middot; trocou '+esc(c.trocou):'')+'</div>';}
  return '<div class="cart none">Cartucho: sem informacao</div>';
}

function renderList(filter){
  const list=document.getElementById('list');
  const q=norm((filter||'').trim());
  let html='', shown=0;
  data.forEach((c,i)=>{
    if(q && norm(c.nome).indexOf(q)===-1) return;
    shown++;
    html+='<div class="item" onclick="goTo('+i+')">'+
      '<div class="row1"><span class="num">'+(i+1)+'</span>'+
        '<span class="nm">'+esc(c.nome)+'</span>'+
        '<span class="dist '+distClass(c.dist)+'">'+c.dist+' mi</span></div>'+
      '<div class="addr">'+esc(c.end)+'</div>'+
      (c.tel?'<a class="telline" href="'+waHref(c.tel)+'" target="_blank" onclick="event.stopPropagation()">'+esc(c.tel)+'</a>':'')+
      cartBadge(c)+
      (c.tel?'<a class="btn wa" href="'+waHref(c.tel)+'" target="_blank" onclick="event.stopPropagation()">Abrir WhatsApp</a>':'')+
      '<div class="nav">'+
        '<a class="btn waze" href="#" onclick="event.stopPropagation();openWaze('+i+');return false">Waze</a>'+
        '<a class="btn gm" href="#" onclick="event.stopPropagation();openGmaps('+i+');return false">Google Maps</a>'+
      '</div></div>';
  });
  if(shown===0) html='<div class="empty">Nenhum cliente encontrado para essa busca.</div>';
  list.innerHTML=html;
  const lbl=document.getElementById('headlbl');
  if(q) lbl.textContent=shown+' de '+data.length+' clientes';
  else lbl.textContent=data.length+' clientes - toque para abrir/fechar';
}

function onSearch(){
  const v=document.getElementById('search').value;
  document.getElementById('searchwrap').classList.toggle('has', v.length>0);
  renderList(v);
}
function clearSearch(){
  const inp=document.getElementById('search');
  inp.value='';document.getElementById('searchwrap').classList.remove('has');
  renderList('');inp.focus();
}

function toggleList(){const c=document.body.classList.toggle('collapsed');document.getElementById('fab').textContent=c?'Mostrar lista':'Ver mapa inteiro';setTimeout(()=>map.invalidateSize(),250);}
function openWaze(i){const c=data[i];const app='waze://?ll='+c.lat+','+c.lon+'&navigate=yes';const web='https://waze.com/ul?ll='+c.lat+','+c.lon+'&navigate=yes';
  window.location.href=isMobile?app:web;if(isMobile)setTimeout(()=>{window.location.href=web;},1200);}
function openGmaps(i){const c=data[i];const o=mePos?(mePos.lat+','+mePos.lng):'';let url='https://www.google.com/maps/dir/?api=1&destination='+c.lat+','+c.lon+'&travelmode=driving';if(o)url+='&origin='+o;window.open(url,'_blank');}
function popCart(c){
  if(c.vencido===true)return '<span style="color:#c0392b;font-weight:700">Cartucho VENCIDO</span>'+(c.trocou?' (ultima troca '+esc(c.trocou)+')':'');
  if(c.vencido===false)return '<span style="color:#1a7f3c;font-weight:700">Cartucho em dia</span>'+(c.validade?' (vence '+esc(c.validade)+')':'');
  return '<span style="color:#6a7689">Cartucho: sem info</span>';}
function popHtml(c,i){return '<b>'+(i+1)+'. '+esc(c.nome)+'</b><br>'+esc(c.end)+'<br><b>'+c.dist+' mi</b> &middot; Tel: '+(c.tel?esc(c.tel):'-')+'<br>'+popCart(c)+'<br>'+
   (c.tel?'<span class="popbtn" style="background:#25c466" onclick="window.open(\''+waHref(c.tel)+'\',\'_blank\')">WhatsApp</span>':'')+
   '<span class="popbtn" style="background:#1aa9e6" onclick="openWaze('+i+')">Waze</span>'+
   '<span class="popbtn" style="background:#1a7f3c" onclick="openGmaps('+i+')">Maps</span>';}
data.forEach((c,i)=>{const color=c.dist<0.5?'#1a7f3c':(c.dist<1.5?'#0b5cab':'#8090a8');
  const m=L.circleMarker([c.lat,c.lon],{radius:11,fillColor:color,color:'#fff',weight:2,fillOpacity:.95}).addTo(map);
  m.bindTooltip(String(i+1),{permanent:true,direction:'center',className:'mtt'});m.bindPopup(popHtml(c,i));markers.push(m);});
function goTo(i){const c=data[i];map.setView([c.lat,c.lon],16);markers[i].openPopup();if(line)map.removeLayer(line);
  const from=mePos?[mePos.lat,mePos.lng]:[alvo.lat,alvo.lon];
  line=L.polyline([from,[c.lat,c.lon]],{color:'#0b5cab',weight:3,dashArray:'8,6',opacity:.8}).addTo(map);}
function locate(){if(!navigator.geolocation){alert('Seu aparelho nao permite localizacao.');return;}
  document.getElementById('locbtn').textContent='Localizando...';
  navigator.geolocation.getCurrentPosition(p=>{mePos={lat:p.coords.latitude,lng:p.coords.longitude};
    if(meMarker)map.removeLayer(meMarker);
    const ic=L.divIcon({className:'',html:'<div class="me"></div>',iconSize:[16,16],iconAnchor:[8,8]});
    meMarker=L.marker([mePos.lat,mePos.lng],{icon:ic}).addTo(map).bindPopup('Voce esta aqui').openPopup();
    map.setView([mePos.lat,mePos.lng],13);document.getElementById('locbtn').textContent='Ativa';
  },err=>{document.getElementById('locbtn').textContent='Localizacao';
    const grp=L.featureGroup(markers);map.fitBounds(grp.getBounds().pad(0.15));},{enableHighAccuracy:true,timeout:8000});}

renderList('');
setTimeout(()=>map.invalidateSize(),300);
const grp=L.featureGroup(markers);map.fitBounds(grp.getBounds().pad(0.15));locate();
</script></body></html>
